name: 🐛 Bug report
description: Something is broken
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail you provide, the faster we can fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I clicked Generate, the app crashed with...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected the image to render.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1. Open My-LM
        2. Go to Generate
        3. ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Linux (specify distro in env section)
        - macOS
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: GPU model, VRAM, Python version, Node version, My-LM commit hash.
      value: |
        - GPU:
        - VRAM:
        - Python:
        - Node:
        - My-LM commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant error output, bridge stderr, or DevTools console.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am on the latest commit of `main`.
          required: true
